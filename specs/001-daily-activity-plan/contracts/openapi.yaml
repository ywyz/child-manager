    put:
      tags: [Plans]
      summary: 乐观锁自动保存；不创建快照
      parameters:
        - $ref: "#/components/parameters/PlanId"
        - $ref: "#/components/parameters/CsrfHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PlanSaveRequest" }
      responses:
        "200": { $ref: "#/components/responses/PlanOk" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/ValidationError" }
  /api/v1/plans/{plan_id}/save:
    put:
      tags: [Plans]
      summary: 显式保存正文和作者并创建手动快照
      parameters:
        - $ref: "#/components/parameters/PlanId"
        - $ref: "#/components/parameters/CsrfHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PlanSaveRequest" }
      responses:
        "200": { $ref: "#/components/responses/PlanOk" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/ValidationError" }
  /api/v1/plans/{plan_id}/archive:
    post:
      tags: [Plans]
      summary: 归档并创建快照
      parameters:
        - $ref: "#/components/parameters/PlanId"
        - $ref: "#/components/parameters/CsrfHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/VersionRequest" }
      responses:
        "200": { $ref: "#/components/responses/PlanOk" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
  /api/v1/plans/{plan_id}/unarchive:
    post:
      tags: [Plans]
      summary: 恢复归档并创建快照
      parameters:
        - $ref: "#/components/parameters/PlanId"
        - $ref: "#/components/parameters/CsrfHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/VersionRequest" }
      responses:
        "200": { $ref: "#/components/responses/PlanOk" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
  /api/v1/plans/{plan_id}/snapshots:
    get:
      tags: [Plans]
      summary: 分页查看不可变教案历史
      parameters:
        - $ref: "#/components/parameters/PlanId"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200": { $ref: "#/components/responses/PlanSnapshotPage" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
  /api/v1/plans/{plan_id}/snapshots/{snapshot_id}/restore:
    post:
      tags: [Plans]
      summary: 保存恢复前内容并恢复所选历史
      parameters:
        - $ref: "#/components/parameters/PlanId"
        - $ref: "#/components/parameters/SnapshotId"
        - $ref: "#/components/parameters/CsrfHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/VersionRequest" }
      responses:
        "200": { $ref: "#/components/responses/PlanOk" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
  /api/v1/plans/{plan_id}/group-activity-sources:
    get:
      tags: [Plans]
      summary: 分页查看集体活动来源元数据
      parameters:
        - $ref: "#/components/parameters/PlanId"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200": { $ref: "#/components/responses/LessonPlanSourcePage" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
  /api/v1/plans/{plan_id}/group-activity-sources/text:
    post:
      tags: [Plans]
      summary: 保存教师确认的粘贴来源文本
      parameters:
        - $ref: "#/components/parameters/PlanId"
        - $ref: "#/components/parameters/CsrfHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [text]
              properties:
                text: { type: string, minLength: 1, maxLength: 200000 }
      responses:
        "201": { $ref: "#/components/responses/LessonPlanSourceCreated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/ValidationError" }
  /api/v1/plans/{plan_id}/group-activity-sources/docx:
    post:
      tags: [Plans]
      summary: 安全提取 DOCX 文本并立即清理临时文件
      description: |
        压缩文件不超过 10 MiB，展开不超过 50 MiB，ZIP 条目不超过 1000，
        提取文本不超过 200000 字符；拒绝宏、外部关系、路径穿越和嵌套压缩。
      parameters:
        - $ref: "#/components/parameters/PlanId"
        - $ref: "#/components/parameters/CsrfHeader"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              additionalProperties: false
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  maxLength: 10485760
      responses:
        "201": { $ref: "#/components/responses/LessonPlanSourceCreated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "413": { $ref: "#/components/responses/ValidationError" }
        "415": { $ref: "#/components/responses/ValidationError" }
        "422": { $ref: "#/components/responses/ValidationError" }
  /api/v1/plans/{plan_id}/ai/batch:
    post:
      tags: [Plans]
      summary: 一键创建晨间、晨谈、室内、户外四个子任务
      description: |
        页面须先完成版本校验保存，再创建非执行 `ai.batch` 父任务及四个执行子任务。父任务
        的数据库 execution/attempt/租约字段均为 NULL，不投递、不租约；响应 attempt 字段固定
        投影为 0/0，status/has_partial_failure 从四个子任务派生。
        `503` 只使用 `database.unavailable` 或 `configuration.unavailable`；数据库提交后 Redis
        投递失败仍返回 `202`，子任务保持 `pending_dispatch` 并由扫描器自动重投。
      parameters:
        - $ref: "#/components/parameters/PlanId"
        - $ref: "#/components/parameters/CsrfHeader"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AiBatchRequest" }
      responses:
        "202": { $ref: "#/components/responses/JobAccepted" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/ValidationError" }
        "503": { $ref: "#/components/responses/Unavailable" }
  /api/v1/plans/{plan_id}/ai/generations:
    post:
      tags: [Plans]
      summary: 保存必要内容后创建一个稳定 AI 任务
      description: |
        页面须先完成待保存内容的版本校验保存。`daily_reflection` 在保存、五栏完整性校验与
        任务插入的同一数据库事务中处理，并创建唯一 pending AI 结果占位，冻结五栏输入/哈希、
        目标基线、模型、提示词和 Schema；该预保存递增版本但不建快照，任一步失败或冲突均
        回滚正文、任务和结果。反思 `current_plan` 排除当前旧反思。`503` 只使用
        `database.unavailable` 或 `configuration.unavailable`；数据库提交后 Redis 投递失败仍
        返回 `202 pending_dispatch`。`group_activity_add_step` 只允许在拆分预览采用并保存后
        创建，并只读取受理时已保存的当前集体活动；采用拆分前请求必须拒绝。
      parameters:
        - $ref: "#/components/parameters/PlanId"
        - $ref: "#/components/parameters/CsrfHeader"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AiGenerationRequest" }
      responses:
        "202": { $ref: "#/components/responses/JobAccepted" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/ValidationError" }
        "503": { $ref: "#/components/responses/Unavailable" }
  /api/v1/plans/{plan_id}/jobs:
    get:
      tags: [Jobs]
      summary: 分页恢复教案任务历史和未完成任务
      parameters:
        - $ref: "#/components/parameters/PlanId"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200": { $ref: "#/components/responses/JobPage" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/v1/jobs/{job_id}:
    get:
      tags: [Jobs]
      summary: 查看 PostgreSQL 权威任务状态
      parameters:
        - $ref: "#/components/parameters/JobId"
      responses:
        "200":
          description: 任务；父任务可含有界子任务
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Job" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
  /api/v1/jobs/{job_id}/preview:
    get:
      tags: [Jobs]
      summary: 查看待确认结构化 AI 预览
      parameters:
        - $ref: "#/components/parameters/JobId"
      responses:
        "200":
          description: 预览
          content:
            application/json:
              schema: { $ref: "#/components/schemas/JobPreview" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
  /api/v1/jobs/{job_id}/adopt:
    post:
      tags: [Jobs]
      summary: 复核权限、栏目、输入和版本后采用一次
      parameters:
        - $ref: "#/components/parameters/JobId"
        - $ref: "#/components/parameters/CsrfHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/VersionRequest" }
      responses:
        "200": { $ref: "#/components/responses/PlanOk" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
  /api/v1/jobs/{job_id}/reject:
    post:
      tags: [Jobs]
      summary: 明确保留原内容；不创建教案快照
      parameters:
        - $ref: "#/components/parameters/JobId"
        - $ref: "#/components/parameters/CsrfHeader"
      responses:
        "200":
          description: 已拒绝；重复请求返回原状态
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Job" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
  /api/v1/jobs/{job_id}/retry:
    post:
      tags: [Jobs]
      summary: 以新幂等 Key 重试最终失败的 AI 栏目任务
      description: |
        只接受存在 AI result 的 failed 执行型栏目任务；`ai.batch`、`prompt.test`、
        `word.export` 或其他状态返回 `409 job.retry_not_allowed`。同一事务创建新根任务和
        pending result，并从原 result 精确复制栏目基线、实际输入、模型、提示词和 Schema；
        不按当前 plan/settings 重建。job_id 实际路径参数必须进入请求 fingerprint。提交前
        PostgreSQL/必要本地配置失败返回 503，提交后 Redis 失败仍返回 `202 pending_dispatch`。
      parameters:
        - $ref: "#/components/parameters/JobId"
        - $ref: "#/components/parameters/CsrfHeader"
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "202": { $ref: "#/components/responses/JobAccepted" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/ValidationError" }
        "503": { $ref: "#/components/responses/Unavailable" }

  /api/v1/plans/{plan_id}/exports:
    get:
      tags: [Exports]
      summary: 分页查看教案导出历史
      parameters:
        - $ref: "#/components/parameters/PlanId"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200": { $ref: "#/components/responses/ExportPage" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    post:
      tags: [Exports]
      summary: 保存校验后创建独立 Word 导出任务
      description: |
        缺失确认只检查晨间、晨谈、集体、室内和户外五栏；`daily_reflection` 为空不触发确认，
        但 Word 仍保留三行固定位置。`confirm_incomplete=false` 且五栏存在缺失时先返回 409，
        不保存或消耗幂等 Key。
        其余请求在同一事务完成版本 CAS、无快照保存、不可变导出输入复制、记录和任务创建；
        Worker 不重读后来变化的当前教案。`503` 仅表示 PostgreSQL、模板或创建任务所需本地
        配置不可用；数据库提交后 Redis 投递失败仍返回 `202 pending_dispatch`。
      parameters:
        - $ref: "#/components/parameters/PlanId"
        - $ref: "#/components/parameters/CsrfHeader"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ExportRequest" }
      responses:
        "202":
          description: 导出已受理
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ExportAccepted" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/ValidationError" }
        "503": { $ref: "#/components/responses/Unavailable" }
  /api/v1/exports/{export_id}:
    get:
      tags: [Exports]
      summary: 查看导出状态、哈希和文件名
      parameters:
        - $ref: "#/components/parameters/ExportId"
      responses:
        "200":
          description: 导出记录
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Export" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
  /api/v1/exports/{export_id}/download:
    get:
      tags: [Exports]
      summary: 再次授权后流式下载历史 Word
      parameters:
        - $ref: "#/components/parameters/ExportId"
      responses:
        "200":
          description: DOCX 文件；写入下载审计
          headers:
            Content-Disposition:
              schema: { type: string }
          content:
            application/vnd.openxmlformats-officedocument.wordprocessingml.document:
              schema: { type: string, format: binary }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "410": { $ref: "#/components/responses/Gone" }

  /api/v1/audit-events:
    get:
      tags: [Audit]
      summary: 管理员分页筛选审计事件
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
        - in: query
          name: event_code
          schema: { type: string }
        - in: query
          name: actor_user_id
          schema: { type: string, format: uuid }
        - in: query
          name: resource_type
          schema: { type: string }
        - in: query
          name: outcome
          schema: { type: string, enum: [success, failure] }
        - in: query
          name: occurred_from
          schema: { type: string, format: date-time }
        - in: query
          name: occurred_to
          schema: { type: string, format: date-time }
      responses:
        "200": { $ref: "#/components/responses/AuditEventPage" }
        "403": { $ref: "#/components/responses/Forbidden" }
  /api/v1/audit-events/{event_id}:
    get:
      tags: [Audit]
      summary: 查看事件白名单元数据
      parameters:
        - $ref: "#/components/parameters/EventId"
      responses:
        "200": { $ref: "#/components/responses/AuditEventOk" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

components:
  securitySchemes:
    accessCookie:
      type: apiKey
      in: cookie
      name: child_manager_access
      description: 15 分钟 HS256 JWT；Secure、HttpOnly、SameSite=Lax、Path=/
    refreshCookie:
      type: apiKey
      in: cookie
      name: child_manager_refresh
      description: 7 天绝对期限的随机 opaque token；只保存强哈希并每次轮换

  headers:
    CsrfSetCookie:
      description: 单独一条 child_manager_csrf Set-Cookie；Secure（回环开发例外）、SameSite=Lax、Path=/
      schema: { type: string }
    AuthSetCookies:
      description: >-
        两条独立 Set-Cookie 字段，依次设置 child_manager_access 与 child_manager_refresh；
        raw HTTP/BFF 不得用逗号折叠
      schema:
        type: array
        minItems: 2
        maxItems: 2
        items: { type: string }
    ClearAuthCookies:
      description: >-
        两条独立 Set-Cookie 字段，分别以 Max-Age=0/过期时间清除 access 与 refresh；
        raw HTTP/BFF 不得用逗号折叠
      schema:
        type: array
        minItems: 2
        maxItems: 2
        items: { type: string }

  parameters:
    CsrfHeader:
      in: header
      name: X-CSRF-Token
      required: true
      description: 必须与签名 child_manager_csrf Cookie 匹配；同时校验 Origin/Referer
      schema: { type: string, minLength: 32, maxLength: 512 }
    IdempotencyKey:
      in: header
      name: Idempotency-Key
      required: true
      description: |
        唯一 scope 使用 HTTP 方法和规范化路由模板；请求 fingerprint 还必须包含规范化后的
        实际 path 参数、有语义 query 参数及 canonical JSON body。
      schema: { type: string, minLength: 1, maxLength: 200 }
    Page:
      in: query
      name: page
      schema: { type: integer, minimum: 1, default: 1 }
    PageSize:
      in: query
      name: page_size
      schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
    UserId: { in: path, name: user_id, required: true, schema: { type: string, format: uuid } }
    CredentialId: { in: path, name: credential_id, required: true, schema: { type: string, format: uuid } }
    SessionId: { in: path, name: session_id, required: true, schema: { type: string, format: uuid } }
    InvitationId: { in: path, name: invitation_id, required: true, schema: { type: string, format: uuid } }
    RecoveryRequestId: { in: path, name: recovery_request_id, required: true, schema: { type: string, format: uuid } }
    SemesterId: { in: path, name: semester_id, required: true, schema: { type: string, format: uuid } }
    ClassId: { in: path, name: class_id, required: true, schema: { type: string, format: uuid } }
    ProfileId: { in: path, name: profile_id, required: true, schema: { type: string, format: uuid } }
    VersionId: { in: path, name: version_id, required: true, schema: { type: string, format: uuid } }
    RunId: { in: path, name: run_id, required: true, schema: { type: string, format: uuid } }
    PlanId: { in: path, name: plan_id, required: true, schema: { type: string, format: uuid } }
    SnapshotId: { in: path, name: snapshot_id, required: true, schema: { type: string, format: uuid } }
    JobId: { in: path, name: job_id, required: true, schema: { type: string, format: uuid } }
    ExportId: { in: path, name: export_id, required: true, schema: { type: string, format: uuid } }
    EventId: { in: path, name: event_id, required: true, schema: { type: string, format: uuid } }
    AreaType:
      in: path
      name: area_type
      required: true
      schema: { type: string, enum: [indoor, outdoor] }
    PromptCode:
      in: path
      name: code
      required: true
      schema: { $ref: "#/components/schemas/PromptCode" }

  responses:
    HealthOk:
      description: 健康状态
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Health" }
    UserOk:
      description: 脱敏账号
      content: { application/json: { schema: { $ref: "#/components/schemas/User" } } }
    UserCreated:
      description: 脱敏账号已创建
      content: { application/json: { schema: { $ref: "#/components/schemas/User" } } }
    UserPage:
      description: 分页账号
      content: { application/json: { schema: { $ref: "#/components/schemas/UserPage" } } }
    KindergartenOk:
      description: 园所设置
      content: { application/json: { schema: { $ref: "#/components/schemas/Kindergarten" } } }
    AgeGroupList:
      description: 完整有序的四个系统年龄段
      content: { application/json: { schema: { $ref: "#/components/schemas/AgeGroupList" } } }
    SemesterOk:
      description: 学期
      content: { application/json: { schema: { $ref: "#/components/schemas/Semester" } } }
    SemesterCreated:
      description: 学期已创建
      content: { application/json: { schema: { $ref: "#/components/schemas/Semester" } } }
    SemesterPage:
      description: 分页学期
      content: { application/json: { schema: { $ref: "#/components/schemas/SemesterPage" } } }
    ClassOk:
      description: 班级
      content: { application/json: { schema: { $ref: "#/components/schemas/Class" } } }
    ClassCreated:
      description: 班级已创建
      content: { application/json: { schema: { $ref: "#/components/schemas/Class" } } }
    ClassPage:
      description: 分页班级
      content: { application/json: { schema: { $ref: "#/components/schemas/ClassPage" } } }
    AreaPage:
      description: 分页班级区域，按 sort_order 和 id 稳定排序
      content: { application/json: { schema: { $ref: "#/components/schemas/AreaPage" } } }
    AiModelProfileOk:
      description: 脱敏 AI 模型档案
      content: { application/json: { schema: { $ref: "#/components/schemas/AiModelProfile" } } }
    AiModelProfileCreated:
      description: 脱敏 AI 模型档案已创建
      content: { application/json: { schema: { $ref: "#/components/schemas/AiModelProfile" } } }
    AiModelProfilePage:
      description: 分页脱敏 AI 模型档案
      content: { application/json: { schema: { $ref: "#/components/schemas/AiModelProfilePage" } } }
    PromptDefinitionOk:
      description: 提示词定义详情
      content: { application/json: { schema: { $ref: "#/components/schemas/PromptDefinition" } } }
    PromptDefinitionPage:
      description: 分页提示词定义
      content: { application/json: { schema: { $ref: "#/components/schemas/PromptDefinitionPage" } } }
    PromptVersionOk:
      description: 提示词版本
      content: { application/json: { schema: { $ref: "#/components/schemas/PromptVersion" } } }
    PromptVersionCreated:
      description: 提示词版本已创建
      content: { application/json: { schema: { $ref: "#/components/schemas/PromptVersion" } } }
    PromptVersionPage:
      description: 分页提示词版本
      content: { application/json: { schema: { $ref: "#/components/schemas/PromptVersionPage" } } }
    PlanSnapshotPage:
      description: 分页不可变教案快照
      content: { application/json: { schema: { $ref: "#/components/schemas/PlanSnapshotPage" } } }
    LessonPlanSourceCreated:
      description: 已确认来源文本
      content: { application/json: { schema: { $ref: "#/components/schemas/LessonPlanSource" } } }
    LessonPlanSourcePage:
      description: 分页来源文本
      content: { application/json: { schema: { $ref: "#/components/schemas/LessonPlanSourcePage" } } }
    AuditEventOk:
      description: 脱敏审计事件
      content: { application/json: { schema: { $ref: "#/components/schemas/AuditEvent" } } }
    AuditEventPage:
      description: 分页脱敏审计事件
      content: { application/json: { schema: { $ref: "#/components/schemas/AuditEventPage" } } }
    PlanOk:
      description: 当前教案
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Plan" }
    PlanPage:
      description: 分页教案
      content:
        application/json:
          schema: { $ref: "#/components/schemas/PlanPage" }
    JobAccepted:
      description: PostgreSQL 已受理；Redis 故障时 status 为 pending_dispatch
      content:
        application/json:
          schema: { $ref: "#/components/schemas/JobAccepted" }
    JobPage:
      description: 分页任务
      content:
        application/json:
          schema: { $ref: "#/components/schemas/JobPage" }
    PromptTestPage:
      description: 最近二十条提示词测试
      content:
        application/json:
          schema: { $ref: "#/components/schemas/PromptTestPage" }
    ExportPage:
      description: 分页导出
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ExportPage" }
    RegistrationOptionsOk:
      description: 5 分钟单次 WebAuthn 注册 options；publicKey 可直接传给浏览器 API
      content: { application/json: { schema: { $ref: "#/components/schemas/WebAuthnRegistrationOptions" } } }
    AuthenticationOptionsOk:
      description: 5 分钟单次 WebAuthn 认证 options；publicKey 可直接传给浏览器 API
      content: { application/json: { schema: { $ref: "#/components/schemas/WebAuthnAuthenticationOptions" } } }
    RegistrationPending:
      description: 凭据登记完成，等待带外核验；未建立会话
      content: { application/json: { schema: { $ref: "#/components/schemas/RegistrationPending" } } }
    Authenticated:
      description: 通行密钥认证成功并设置 access/refresh Cookie；激活后首次成功认证只向用户返回一次恢复码
      headers:
        Set-Cookie: { $ref: "#/components/headers/AuthSetCookies" }
      content: { application/json: { schema: { $ref: "#/components/schemas/AuthenticationResult" } } }
    StepUpOk:
      description: 当前会话的新近用户验证已更新
      content: { application/json: { schema: { $ref: "#/components/schemas/StepUpResult" } } }
    CredentialOk:
      description: 脱敏通行密钥凭据元数据
      content: { application/json: { schema: { $ref: "#/components/schemas/Credential" } } }
    CredentialCreated:
      description: 通行密钥凭据已登记
      content: { application/json: { schema: { $ref: "#/components/schemas/Credential" } } }
    CredentialListOk:
      description: 当前目标账号的凭据元数据；不返回公钥、credential 原文或 assertion
      content: { application/json: { schema: { $ref: "#/components/schemas/CredentialList" } } }
    InvitationIssued:
      description: 邀请已签发；明文 token 仅在本响应展示一次，不返回含 token 的 URL
      content: { application/json: { schema: { $ref: "#/components/schemas/InvitationIssued" } } }
    InvitationListOk:
      description: 邀请状态列表；不返回 token 或摘要
      content: { application/json: { schema: { $ref: "#/components/schemas/InvitationList" } } }
    AdminCredentialRevoked:
      description: 凭据已撤销；若撤销教师最后凭据则同时撤销会话并返回一次性重新邀请
      content: { application/json: { schema: { $ref: "#/components/schemas/AdminCredentialRevocationResult" } } }
    RecoveryRequestAccepted:
      description: 统一恢复申请响应；不确认账号或恢复码是否存在
      content: { application/json: { schema: { $ref: "#/components/schemas/RecoveryRequestAccepted" } } }
    RecoveryRequestListOk:
      description: 待核验恢复申请列表；不返回恢复码或摘要
      content: { application/json: { schema: { $ref: "#/components/schemas/RecoveryRequestList" } } }
    RecoveryEnrollmentIssued:
      description: 人工核验完成并签发短时恢复登记 token；明文只展示一次
      content: { application/json: { schema: { $ref: "#/components/schemas/RecoveryEnrollmentIssued" } } }
    RecoveryCompleted:
      description: 恢复完成；新恢复码只展示一次且未建立会话
      content: { application/json: { schema: { $ref: "#/components/schemas/RecoveryCompleted" } } }
    RecoveryCodeIssued:
      description: 新离线恢复码只展示一次
      content: { application/json: { schema: { $ref: "#/components/schemas/RecoveryCodeIssued" } } }
    SessionListOk:
      description: 本人有效会话列表
      content: { application/json: { schema: { $ref: "#/components/schemas/SessionList" } } }
    AuthenticationFailed:
      description: 通用认证失败，不暴露凭据、账号、停用或签名失败原因
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    Unauthorized:
      description: 未认证或会话无效
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    Forbidden:
      description: CSRF/来源错误或无权限
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    NotFound:
      description: 资源不存在或不应向当前用户暴露
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    Conflict:
      description: 版本、幂等、预览有效性或业务不变量冲突
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    Gone:
      description: 历史导出记录存在但服务器副本缺失
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    CeremonyUnavailable:
      description: Ceremony 已过期、已消费、跨用途或上下文不匹配
      content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } }
    InvitationUnavailable:
      description: 邀请过期、撤销或已消费，不细分状态
      content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } }
    RecoveryUnavailable:
      description: 恢复材料或登记授权过期、撤销或已消费，不细分状态
      content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } }
    ValidationError:
      description: 请求字段或业务前置条件无效
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    TooManyRequests:
      description: 公开身份端点按可信来源和 ceremony purpose 限流
      headers:
        Retry-After:
          schema: { type: integer, minimum: 1, maximum: 60 }
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    Unavailable:
      description: PostgreSQL 或必要服务端本地配置/固定资源在请求受理前不可用
      content:
        application/json:
          schema: { $ref: "#/components/schemas/UnavailableError" }

  schemas:
    Uuid:
      type: string
      format: uuid
    Base64Url:
      type: string
      minLength: 1
      maxLength: 4096
      pattern: "^[A-Za-z0-9_-]+$"
      description: 无填充 base64url；服务端解码后仍须执行各字段的字节长度限制
    SecretInput:
      type: string
      minLength: 22
      maxLength: 512
      writeOnly: true
      description: 只从受控入口输入；数据库只保存带服务端 pepper 的摘要
    OneTimeSecret:
      type: string
      minLength: 22
      maxLength: 512
      readOnly: true
      description: 只在本次成功响应展示一次；不得进入 URL、日志、审计或后续读取响应
    ErrorField:
      type: object
      additionalProperties: false
      required: [field, code, message]
      properties:
        field: { type: string }
        code: { type: string }
        message: { type: string }
    Error:
      type: object
      additionalProperties: false
      required: [code, message, request_id, field_errors]
      properties:
        code: { type: string, pattern: "^[a-z][a-z0-9_.-]+$" }
        message: { type: string }
        request_id: { type: string, format: uuid }
        field_errors:
          type: array
          items: { $ref: "#/components/schemas/ErrorField" }
    UnavailableError:
      type: object
      additionalProperties: false
      required: [code, message, request_id, field_errors]
      properties:
        code:
          type: string
          enum: [database.unavailable, configuration.unavailable]
        message: { type: string }
        request_id: { type: string, format: uuid }
        field_errors:
          type: array
          maxItems: 0
          items: { $ref: "#/components/schemas/ErrorField" }
    Health:
      type: object
      additionalProperties: false
      required: [status, checks]
      properties:
        status: { type: string, enum: [ok, degraded, unavailable] }
        checks:
          type: object
          additionalProperties:
            type: string
            enum: [ok, degraded, unavailable, not_required]
    CsrfResponse:
      type: object
      additionalProperties: false
      required: [csrf_token]
      properties:
        csrf_token: { type: string, minLength: 32, maxLength: 512 }
    BootstrapRegistrationOptionsRequest:
      type: object
      additionalProperties: false
      required: [bootstrap_token]
      properties:
        bootstrap_token: { $ref: "#/components/schemas/SecretInput" }
    InvitationRegistrationOptionsRequest:
      type: object
      additionalProperties: false
      required: [invitation_token]
      properties:
        invitation_token: { $ref: "#/components/schemas/SecretInput" }
    RecoveryRegistrationOptionsRequest:
      type: object
      additionalProperties: false
      required: [enrollment_token]
      properties:
        enrollment_token: { $ref: "#/components/schemas/SecretInput" }
    PublicKeyCredentialDescriptor:
      type: object
      additionalProperties: false
      required: [type, id]
      properties:
        type: { type: string, const: public-key }
        id: { $ref: "#/components/schemas/Base64Url" }
        transports:
          type: array
          uniqueItems: true
          items: { type: string, enum: [usb, nfc, ble, internal, hybrid] }
    WebAuthnRegistrationOptions:
      type: object
      additionalProperties: false
      required: [ceremony_id, expires_at, publicKey]
      properties:
        ceremony_id: { $ref: "#/components/schemas/Uuid" }
        expires_at: { type: string, format: date-time }
        publicKey:
          type: object
          additionalProperties: false
          required: [challenge, rp, user, pubKeyCredParams, timeout, excludeCredentials, authenticatorSelection, attestation]
          properties:
            challenge: { $ref: "#/components/schemas/Base64Url" }
            rp:
              type: object
              additionalProperties: false
              required: [id, name]
              properties:
                id: { type: string, minLength: 1, maxLength: 253 }
                name: { type: string, minLength: 1, maxLength: 120 }
            user:
              type: object
              additionalProperties: false
              required: [id, name, displayName]
              properties:
                id:
                  allOf: [{ $ref: "#/components/schemas/Base64Url" }]
                  description: 32 字节随机不透明 user handle，不含用户名、手机号或其他个人信息
                name: { type: string, minLength: 1, maxLength: 120 }
                displayName: { type: string, minLength: 1, maxLength: 120 }
            pubKeyCredParams:
              type: array
              minItems: 1
              items:
                type: object
                additionalProperties: false
                required: [type, alg]
                properties:
                  type: { type: string, const: public-key }
                  alg: { type: integer, enum: [-7, -257] }
            timeout: { type: integer, const: 300000 }
            excludeCredentials:
              type: array
              items: { $ref: "#/components/schemas/PublicKeyCredentialDescriptor" }
            authenticatorSelection:
              type: object
              additionalProperties: false
              required: [residentKey, requireResidentKey, userVerification]
              properties:
                residentKey: { type: string, const: required }
                requireResidentKey: { type: boolean, const: true }
                userVerification: { type: string, const: required }
            attestation: { type: string, const: none }
            extensions:
              type: object
              additionalProperties: false
              properties:
                credProps: { type: boolean, const: true }
    WebAuthnAuthenticationOptions:
      type: object
      additionalProperties: false
      required: [ceremony_id, expires_at, publicKey]
      properties:
        ceremony_id: { $ref: "#/components/schemas/Uuid" }
        expires_at: { type: string, format: date-time }
        publicKey:
          type: object
          additionalProperties: false
          required: [challenge, rpId, timeout, allowCredentials, userVerification]
          properties:
            challenge: { $ref: "#/components/schemas/Base64Url" }
            rpId: { type: string, minLength: 1, maxLength: 253 }
            timeout: { type: integer, const: 300000 }
            allowCredentials:
              type: array
              description: 常规无用户名认证为空；step-up 可只包含当前账号有效凭据
              items: { $ref: "#/components/schemas/PublicKeyCredentialDescriptor" }
            userVerification: { type: string, const: required }
    RegistrationCredential:
      type: object
      additionalProperties: false
      required: [id, rawId, type, response, clientExtensionResults]
      properties:
        id: { $ref: "#/components/schemas/Base64Url" }
        rawId: { $ref: "#/components/schemas/Base64Url" }
        type: { type: string, const: public-key }
        authenticatorAttachment: { type: [string, "null"], enum: [platform, cross-platform, null] }
        response:
          type: object
          additionalProperties: false
          required: [clientDataJSON, attestationObject]
          properties:
            clientDataJSON: { $ref: "#/components/schemas/Base64Url" }
            attestationObject: { $ref: "#/components/schemas/Base64Url" }
            transports:
              type: array
              uniqueItems: true
              items: { type: string, enum: [usb, nfc, ble, internal, hybrid] }
        clientExtensionResults: { type: object, additionalProperties: true }
    AuthenticationCredential:
      type: object
      additionalProperties: false
      required: [id, rawId, type, response, clientExtensionResults]
      properties:
        id: { $ref: "#/components/schemas/Base64Url" }
        rawId: { $ref: "#/components/schemas/Base64Url" }
        type: { type: string, const: public-key }
        authenticatorAttachment: { type: [string, "null"], enum: [platform, cross-platform, null] }
        response:
          type: object
          additionalProperties: false
          required: [clientDataJSON, authenticatorData, signature, userHandle]
          properties:
            clientDataJSON: { $ref: "#/components/schemas/Base64Url" }
            authenticatorData: { $ref: "#/components/schemas/Base64Url" }
            signature: { $ref: "#/components/schemas/Base64Url" }
            userHandle:
              oneOf:
                - $ref: "#/components/schemas/Base64Url"
                - type: "null"
        clientExtensionResults: { type: object, additionalProperties: true }
    RegistrationVerifyRequest:
      type: object
      additionalProperties: false
      required: [ceremony_id, credential]
      properties:
        ceremony_id: { $ref: "#/components/schemas/Uuid" }
        label: { type: [string, "null"], minLength: 1, maxLength: 120 }
        credential: { $ref: "#/components/schemas/RegistrationCredential" }
    AuthenticationVerifyRequest:
      type: object
      additionalProperties: false
      required: [ceremony_id, credential]
      properties:
        ceremony_id: { $ref: "#/components/schemas/Uuid" }
        credential: { $ref: "#/components/schemas/AuthenticationCredential" }
    RegistrationPending:
      type: object
      additionalProperties: false
      required: [user_id, status, credential_id, verification_required]
      properties:
        user_id: { $ref: "#/components/schemas/Uuid" }
        status: { type: string, const: pending_verification }
        credential_id: { $ref: "#/components/schemas/Uuid" }
        verification_required: { type: boolean, const: true }
    StepUpResult:
      type: object
      additionalProperties: false
      required: [verified_at, valid_until]
      properties:
        verified_at: { type: string, format: date-time }
        valid_until: { type: string, format: date-time, description: 恰好为 verified_at 后 5 分钟 }
    CurrentUser:
      type: object
      additionalProperties: false
      required: [id, display_name, kindergarten, role_codes, capabilities, session_id, last_reauthenticated_at]
      properties:
        id: { $ref: "#/components/schemas/Uuid" }
        username: { type: string }
        display_name: { type: string }
        kindergarten:
          type: object
          additionalProperties: false
          required: [id, name, timezone]
          properties:
            id: { $ref: "#/components/schemas/Uuid" }
            name: { type: string }
            timezone: { type: string, const: Asia/Shanghai }
        role_codes:
          type: array
          uniqueItems: true
          items: { type: string, enum: [admin, teacher] }
        capabilities:
          type: array
          uniqueItems: true
          items: { type: string }
        session_id: { $ref: "#/components/schemas/Uuid" }
        last_reauthenticated_at: { type: [string, "null"], format: date-time }
    AuthenticationResult:
      type: object
      additionalProperties: false
      required: [user, recovery_code]
      properties:
        user: { $ref: "#/components/schemas/CurrentUser" }
        recovery_code:
          description: 仅激活后的首次成功认证返回；后续认证为 null
          oneOf:
            - $ref: "#/components/schemas/OneTimeSecret"
            - type: "null"
    CreateUserRequest:
      type: object
      additionalProperties: false
      required: [username, display_name, role_codes]
      properties:
        username: { type: string, minLength: 1, maxLength: 120 }
        phone_e164: { type: [string, "null"], maxLength: 32 }
        display_name: { type: string, minLength: 1, maxLength: 120 }
        role_codes:
          type: array
          minItems: 1
          uniqueItems: true
          items: { type: string, enum: [admin, teacher] }
    User:
      type: object
      additionalProperties: false
      required: [id, username, phone_e164, display_name, role_codes, status, credential_count, activated_at, created_at, updated_at]
      properties:
        id: { $ref: "#/components/schemas/Uuid" }
        username: { type: string, maxLength: 120 }
        phone_e164: { type: [string, "null"], maxLength: 32 }
        display_name: { type: string, maxLength: 120 }
        role_codes:
          type: array
          uniqueItems: true
          items: { type: string, enum: [admin, teacher] }
        status: { type: string, enum: [pending_registration, pending_verification, active, suspended] }
        credential_count: { type: integer, minimum: 0 }
        activated_at: { type: [string, "null"], format: date-time }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    UserPatch:
      type: object
      additionalProperties: false
      minProperties: 1
      properties:
        username: { type: string, minLength: 1, maxLength: 120 }
        phone_e164: { type: [string, "null"], maxLength: 32 }
        display_name: { type: string, minLength: 1, maxLength: 120 }
    UserPage:
      type: object
      additionalProperties: false
      required: [items, page, page_size, total]
      properties:
        items: { type: array, items: { $ref: "#/components/schemas/User" } }
        page: { type: integer, minimum: 1 }
        page_size: { type: integer, minimum: 1, maximum: 100 }
        total: { type: integer, minimum: 0 }
    AccountActivationRequest:
      type: object
      additionalProperties: false
      required: [verification_confirmed]
      properties:
        verification_confirmed: { type: boolean, const: true }
        verification_note: { type: [string, "null"], maxLength: 500 }
    Credential:
      type: object
      additionalProperties: false
      required: [id, label, transports, backup_eligible, backup_state, created_via, created_at, last_used_at, revoked_at]
      properties:
        id: { $ref: "#/components/schemas/Uuid" }
        label: { type: string, minLength: 1, maxLength: 120 }
        transports:
          type: array
          uniqueItems: true
          items: { type: string, enum: [usb, nfc, ble, internal, hybrid] }
        backup_eligible: { type: boolean }
        backup_state: { type: boolean }
        created_via: { type: string, enum: [bootstrap, invitation, self_add, recovery, migration] }
        created_at: { type: string, format: date-time }
        last_used_at: { type: [string, "null"], format: date-time }
        revoked_at: { type: [string, "null"], format: date-time }
    CredentialPatch:
      type: object
      additionalProperties: false
      required: [label]
      properties:
        label: { type: string, minLength: 1, maxLength: 120 }
    CredentialList:
      type: object
      additionalProperties: false
      required: [items]
      properties:
        items: { type: array, items: { $ref: "#/components/schemas/Credential" } }
    InvitationCreateRequest:
      type: object
      additionalProperties: false
      properties:
        expires_in_hours: { type: integer, minimum: 1, maximum: 24, default: 24 }
    Invitation:
      type: object
      additionalProperties: false
      required: [id, user_id, status, expires_at, issued_at, consumed_at, revoked_at]
      properties:
        id: { $ref: "#/components/schemas/Uuid" }
        user_id: { $ref: "#/components/schemas/Uuid" }
        status: { type: string, enum: [pending, consumed, expired, revoked] }
        expires_at: { type: string, format: date-time }
        issued_at: { type: string, format: date-time }
        consumed_at: { type: [string, "null"], format: date-time }
        revoked_at: { type: [string, "null"], format: date-time }
