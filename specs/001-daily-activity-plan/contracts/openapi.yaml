        - actor_role_codes
        - resource_type
        - resource_id
        - request_id
        - trace_id
        - job_id
        - outcome
        - metadata
        - occurred_at
      properties:
        id: { $ref: "#/components/schemas/Uuid" }
        event_code: { type: string, pattern: "^[a-z][a-z0-9_.-]+$", maxLength: 120 }
        actor_user_id: { type: [string, "null"], format: uuid }
        actor_role_codes:
          type: array
          uniqueItems: true
          items: { type: string, enum: [admin, teacher] }
        resource_type: { type: string, maxLength: 80 }
        resource_id: { type: [string, "null"], format: uuid }
        request_id: { type: [string, "null"], format: uuid }
        trace_id: { type: [string, "null"], format: uuid }
        job_id: { type: [string, "null"], format: uuid }
        outcome: { type: string, enum: [success, failure] }
        metadata: { $ref: "#/components/schemas/AuditMetadata" }
        occurred_at: { type: string, format: date-time }
    AuditEventPage:
      type: object
      additionalProperties: false
      required: [items, page, page_size, total]
      properties:
        items: { type: array, items: { $ref: "#/components/schemas/AuditEvent" } }
        page: { type: integer, minimum: 1 }
        page_size: { type: integer, minimum: 1, maximum: 100 }
        total: { type: integer, minimum: 0 }
