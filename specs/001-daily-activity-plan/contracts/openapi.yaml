openapi: 3.1.0
info:
  title: Child Manager 一日活动计划 API
  version: 2.0.0
  description: |
    首期 M1-M8 的稳定 HTTP 契约。园所、角色和班级权限只能来自服务端会话；
    Redis/Dramatiq 不作为任务事实来源。浏览器只访问当前实现档位的 NiceGUI Web，同源 BFF
    在服务端转发本契约到本档位回环 API，并剥离浏览器伪造的代理地址头。API 只信任显式
    回环 BFF 重建的内部客户端来源。所有用户可见消息使用简体中文。
servers:
  - url: http://127.0.0.1:{api_port}
    description: 仅供对应实现档位的本地 NiceGUI BFF 服务端访问；不是浏览器或生产入口
    variables:
      api_port:
        default: "18000"
        enum: ["18000", "28000"]
        description: Codex 使用 18000，Trae 使用 28000
tags:
  - name: Health
  - name: Auth
  - name: Users
  - name: Settings
  - name: Prompts
  - name: Plans
  - name: Jobs
  - name: Exports
  - name: Audit
security:
  - accessCookie: []

paths:
  /health/live:
    get:
      tags: [Health]
      summary: API 进程存活检查
      security: []
      responses:
        "200":
          $ref: "#/components/responses/HealthOk"
  /health/ready:
    get:
      tags: [Health]
      summary: 数据库与必要配置就绪检查
      description: |
        外部 AI 或在线节假日不可用不得令整体就绪失败。PostgreSQL 不可用返回
        `database.unavailable`；只有 JWT/CSRF 等所有核心请求共同依赖的全局安全配置缺失/无效
        才返回 `configuration.unavailable`。Redis、AI、日历、模板和导出存储只令分项
        degraded，整体仍返回 200。
      security: []
      responses:
        "200":
          $ref: "#/components/responses/HealthOk"
        "503":
          $ref: "#/components/responses/Unavailable"

  /api/v1/auth/csrf:
    get:
      tags: [Auth]
      summary: 签发签名双提交 CSRF Cookie
      security: []
      responses:
        "200":
          description: CSRF Cookie 已签发
          headers:
            Set-Cookie:
              $ref: "#/components/headers/CsrfSetCookie"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CsrfResponse"
  /api/v1/auth/bootstrap/registration/options:
    post:
      tags: [Auth]
      summary: 验证初始化凭据并生成首位管理员注册挑战
      description: 初始化凭据最长 15 分钟、单次使用且数据库只保存摘要；入口与凭据分开交付。
      security: []
      parameters: [{ $ref: "#/components/parameters/CsrfHeader" }]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/BootstrapRegistrationOptionsRequest" } } }
      responses:
        "200": { $ref: "#/components/responses/RegistrationOptionsOk" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "410": { $ref: "#/components/responses/CeremonyUnavailable" }
        "422": { $ref: "#/components/responses/ValidationError" }
        "429": { $ref: "#/components/responses/TooManyRequests" }
  /api/v1/auth/bootstrap/registration/verify:
    post:
      tags: [Auth]
      summary: 完成首位管理员通行密钥登记
      description: 登记后进入 pending_verification；不签发会话，等待双人带外核验和 CLI 激活。
      security: []
      parameters: [{ $ref: "#/components/parameters/CsrfHeader" }]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/RegistrationVerifyRequest" } } }
      responses:
        "200": { $ref: "#/components/responses/RegistrationPending" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "410": { $ref: "#/components/responses/CeremonyUnavailable" }
        "422": { $ref: "#/components/responses/ValidationError" }
        "429": { $ref: "#/components/responses/TooManyRequests" }
  /api/v1/auth/invitation/registration/options:
    post:
      tags: [Auth]
      summary: 验证管理员邀请并生成首个通行密钥注册挑战
      security: []
      parameters: [{ $ref: "#/components/parameters/CsrfHeader" }]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/InvitationRegistrationOptionsRequest" } } }
      responses:
        "200": { $ref: "#/components/responses/RegistrationOptionsOk" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "410": { $ref: "#/components/responses/InvitationUnavailable" }
        "422": { $ref: "#/components/responses/ValidationError" }
        "429": { $ref: "#/components/responses/TooManyRequests" }
  /api/v1/auth/invitation/registration/verify:
    post:
      tags: [Auth]
      summary: 完成受邀账号首个通行密钥登记
      description: 登记后进入 pending_verification；不签发会话，等待管理员带外核验并激活。
      security: []
      parameters: [{ $ref: "#/components/parameters/CsrfHeader" }]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/RegistrationVerifyRequest" } } }
      responses:
        "200": { $ref: "#/components/responses/RegistrationPending" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "410": { $ref: "#/components/responses/CeremonyUnavailable" }
        "422": { $ref: "#/components/responses/ValidationError" }
        "429": { $ref: "#/components/responses/TooManyRequests" }
  /api/v1/auth/authentication/options:
    post:
      tags: [Auth]
      summary: 生成无用户名通行密钥认证挑战
      description: allowCredentials 为空，浏览器使用可发现凭据；响应不得泄露账号是否存在。
      security: []
      parameters: [{ $ref: "#/components/parameters/CsrfHeader" }]
      responses:
        "200": { $ref: "#/components/responses/AuthenticationOptionsOk" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "429": { $ref: "#/components/responses/TooManyRequests" }
  /api/v1/auth/authentication/verify:
    post:
      tags: [Auth]
      summary: 完成通行密钥认证并建立会话
      security: []
      parameters: [{ $ref: "#/components/parameters/CsrfHeader" }]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/AuthenticationVerifyRequest" } } }
      responses:
        "200": { $ref: "#/components/responses/Authenticated" }
        "401": { $ref: "#/components/responses/AuthenticationFailed" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { $ref: "#/components/responses/Conflict" }
        "410": { $ref: "#/components/responses/CeremonyUnavailable" }
        "422": { $ref: "#/components/responses/ValidationError" }
        "429": { $ref: "#/components/responses/TooManyRequests" }
  /api/v1/auth/step-up/options:
    post:
      tags: [Auth]
      summary: 为高风险操作生成新近用户验证挑战
      parameters: [{ $ref: "#/components/parameters/CsrfHeader" }]
      responses:
        "200": { $ref: "#/components/responses/AuthenticationOptionsOk" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "429": { $ref: "#/components/responses/TooManyRequests" }
  /api/v1/auth/step-up/verify:
    post:
      tags: [Auth]
      summary: 完成新近用户验证
      description: 成功后仅把当前会话标记为 5 分钟内已重新认证，不签发新会话。
      parameters: [{ $ref: "#/components/parameters/CsrfHeader" }]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/AuthenticationVerifyRequest" } } }
      responses:
        "200": { $ref: "#/components/responses/StepUpOk" }
        "401": { $ref: "#/components/responses/AuthenticationFailed" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "410": { $ref: "#/components/responses/CeremonyUnavailable" }
        "422": { $ref: "#/components/responses/ValidationError" }
  /api/v1/auth/refresh:
    post:
      tags: [Auth]
      summary: 轮换 Access 与 Refresh Token
      security:
        - refreshCookie: []
      parameters:
        - $ref: "#/components/parameters/CsrfHeader"
      responses:
        "200":
          description: 轮换成功；旧 Refresh Token 已撤销
          headers:
            Set-Cookie:
              $ref: "#/components/headers/AuthSetCookies"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrentUser"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /api/v1/auth/logout:
    post:
      tags: [Auth]
      summary: 撤销当前令牌族并清除 Cookie
      security:
        - refreshCookie: []
      parameters:
        - $ref: "#/components/parameters/CsrfHeader"
      responses:
        "204":
          description: 已退出；重复调用保持幂等
          headers:
            Set-Cookie:
              $ref: "#/components/headers/ClearAuthCookies"
        "403":
          $ref: "#/components/responses/Forbidden"
  /api/v1/auth/me:
    get:
      tags: [Auth]
      summary: 当前账号、角色与能力
      responses:
        "200":
          description: 当前会话
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrentUser"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /api/v1/auth/credentials:
    get:
      tags: [Auth]
      summary: 查看本人通行密钥凭据
      responses:
        "200": { $ref: "#/components/responses/CredentialListOk" }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /api/v1/auth/credentials/registration/options:
    post:
      tags: [Auth]
      summary: 生成本人新增通行密钥注册挑战
      description: 要求当前会话在 5 分钟内完成过 WebAuthn step-up。
      parameters: [{ $ref: "#/components/parameters/CsrfHeader" }]
      responses:
        "200": { $ref: "#/components/responses/RegistrationOptionsOk" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "429": { $ref: "#/components/responses/TooManyRequests" }
  /api/v1/auth/credentials/registration/verify:
    post:
      tags: [Auth]
      summary: 完成本人新增通行密钥登记
      parameters: [{ $ref: "#/components/parameters/CsrfHeader" }]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/RegistrationVerifyRequest" } } }
      responses:
        "201": { $ref: "#/components/responses/CredentialCreated" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { $ref: "#/components/responses/Conflict" }
        "410": { $ref: "#/components/responses/CeremonyUnavailable" }
        "422": { $ref: "#/components/responses/ValidationError" }
  /api/v1/auth/credentials/{credential_id}:
    parameters: [{ $ref: "#/components/parameters/CredentialId" }]
    patch:
      tags: [Auth]
      summary: 命名本人通行密钥凭据
      description: 要求当前会话在 5 分钟内完成过 WebAuthn step-up。
      parameters: [{ $ref: "#/components/parameters/CsrfHeader" }]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/CredentialPatch" } } }
      responses:
        "200": { $ref: "#/components/responses/CredentialOk" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/ValidationError" }
    delete:
      tags: [Auth]
      summary: 撤销本人非最后一个有效凭据
      description: 要求 5 分钟内 step-up；不得撤销本人最后一个有效凭据。
      parameters: [{ $ref: "#/components/parameters/CsrfHeader" }]
      responses:
        "204": { description: 凭据已撤销 }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
  /api/v1/auth/recovery/requests:
    post:
      tags: [Auth]
      summary: 提交账号恢复申请
      description: 无论账号或恢复码是否存在都返回同一 202；恢复码本身不建立会话。
      security: []
      parameters: [{ $ref: "#/components/parameters/CsrfHeader" }]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/RecoveryRequestCreate" } } }
      responses:
        "202": { $ref: "#/components/responses/RecoveryRequestAccepted" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "422": { $ref: "#/components/responses/ValidationError" }
        "429": { $ref: "#/components/responses/TooManyRequests" }
  /api/v1/auth/recovery/registration/options:
    post:
      tags: [Auth]
      summary: 生成人工核验通过后的恢复注册挑战
      security: []
      parameters: [{ $ref: "#/components/parameters/CsrfHeader" }]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/RecoveryRegistrationOptionsRequest" } } }
      responses:
        "200": { $ref: "#/components/responses/RegistrationOptionsOk" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "410": { $ref: "#/components/responses/RecoveryUnavailable" }
        "422": { $ref: "#/components/responses/ValidationError" }
        "429": { $ref: "#/components/responses/TooManyRequests" }
  /api/v1/auth/recovery/registration/verify:
    post:
      tags: [Auth]
      summary: 完成恢复凭据登记并轮换恢复码
      description: 原子撤销旧凭据、全部会话、待处理邀请和旧恢复码；返回新恢复码但不建立会话。
      security: []
      parameters: [{ $ref: "#/components/parameters/CsrfHeader" }]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/RegistrationVerifyRequest" } } }
      responses:
        "200": { $ref: "#/components/responses/RecoveryCompleted" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "410": { $ref: "#/components/responses/RecoveryUnavailable" }
        "422": { $ref: "#/components/responses/ValidationError" }
  /api/v1/auth/recovery-code/rotate:
    post:
      tags: [Auth]
      summary: 主动轮换本人离线恢复码
      description: 要求当前会话在 5 分钟内完成过 WebAuthn step-up；旧恢复码立即失效。
      parameters: [{ $ref: "#/components/parameters/CsrfHeader" }]
      responses:
        "200": { $ref: "#/components/responses/RecoveryCodeIssued" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
  /api/v1/auth/sessions:
    get:
      tags: [Auth]
      summary: 查看本人有效会话
      responses:
        "200": { $ref: "#/components/responses/SessionListOk" }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /api/v1/auth/sessions/{session_id}:
    delete:
      tags: [Auth]
      summary: 撤销本人指定会话
      description: 撤销当前会话时同时清除 access/refresh Cookie。
      parameters:
        - $ref: "#/components/parameters/SessionId"
        - $ref: "#/components/parameters/CsrfHeader"
      responses:
        "204":
          description: 会话已撤销
          headers:
            Set-Cookie: { $ref: "#/components/headers/ClearAuthCookies" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/v1/users:
    get:
      tags: [Users]
      summary: 分页查询账号
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200":
          $ref: "#/components/responses/UserPage"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"
    post:
      tags: [Users]
      summary: 创建管理员或教师账号
      parameters:
        - $ref: "#/components/parameters/CsrfHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequest"
      responses:
        "201":
          $ref: "#/components/responses/UserCreated"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationError"
  /api/v1/users/{user_id}:
    parameters:
      - $ref: "#/components/parameters/UserId"
    get:
      tags: [Users]
      summary: 查看账号
      responses:
        "200":
          $ref: "#/components/responses/UserOk"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"
    patch:
      tags: [Users]
      summary: 修改账号非凭证字段
      parameters:
        - $ref: "#/components/parameters/CsrfHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserPatch"
      responses:
        "200":
          $ref: "#/components/responses/UserOk"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"
  /api/v1/users/{user_id}/roles:
    put:
      tags: [Users]
      summary: 设置账号角色并保护最后一个管理员
      parameters:
        - $ref: "#/components/parameters/UserId"
        - $ref: "#/components/parameters/CsrfHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [role_codes]
              properties:
                role_codes:
                  type: array
                  minItems: 1
                  uniqueItems: true
                  items: { type: string, enum: [admin, teacher] }
      responses:
        "200":
          $ref: "#/components/responses/UserOk"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationError"
  /api/v1/users/{user_id}/activate:
    post:
      tags: [Users]
      summary: 管理员核验并激活已登记账号
      parameters:
        - $ref: "#/components/parameters/UserId"
        - $ref: "#/components/parameters/CsrfHeader"
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/AccountActivationRequest" } } }
      responses:
        "200":
          $ref: "#/components/responses/UserOk"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"
  /api/v1/users/{user_id}/deactivate:
    post:
      tags: [Users]
      summary: 停用账号并撤销会话
      parameters:
        - $ref: "#/components/parameters/UserId"
        - $ref: "#/components/parameters/CsrfHeader"
      responses:
        "200":
          $ref: "#/components/responses/UserOk"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationError"
  /api/v1/users/{user_id}/invitations:
    parameters: [{ $ref: "#/components/parameters/UserId" }]
    get:
      tags: [Users]
      summary: 查看账号邀请历史
      responses:
        "200": { $ref: "#/components/responses/InvitationListOk" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    post:
      tags: [Users]
      summary: 签发单次账号邀请
      description: 最长有效 24 小时；明文只返回一次，数据库只保存摘要且不得返回含秘密 URL。
      parameters: [{ $ref: "#/components/parameters/CsrfHeader" }]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/InvitationCreateRequest" } } }
      responses:
        "201": { $ref: "#/components/responses/InvitationIssued" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/ValidationError" }
  /api/v1/users/{user_id}/invitations/{invitation_id}/revoke:
    post:
      tags: [Users]
      summary: 撤销未消费邀请
      parameters:
        - $ref: "#/components/parameters/UserId"
        - $ref: "#/components/parameters/InvitationId"
        - $ref: "#/components/parameters/CsrfHeader"
      responses:
        "204": { description: 邀请已撤销；重复调用保持幂等 }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
  /api/v1/users/{user_id}/credentials:
    get:
      tags: [Users]
      summary: 管理员查看账号凭据元数据
      parameters: [{ $ref: "#/components/parameters/UserId" }]
      responses:
        "200": { $ref: "#/components/responses/CredentialListOk" }
        "401": { $ref: "#/components/responses/Unauthorized" }
