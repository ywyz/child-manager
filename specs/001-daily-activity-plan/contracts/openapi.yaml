  /api/v1/prompts/{code}/tests:
    get:
      tags: [Prompts]
      summary: 分页查看最近二十条提示词测试
      parameters:
        - $ref: "#/components/parameters/PromptCode"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200": { $ref: "#/components/responses/PromptTestPage" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    post:
      tags: [Prompts]
      summary: 创建异步提示词测试任务
      description: |
        先按路径 prompt code 的固定输入 Schema 校验 variables，再在同一数据库事务中创建
        `prompt.test` 任务和 `pending` 测试运行，并冻结不可变 input context/hash、提示词正文/
        哈希、结果 Schema 及所选模型的 profile/base_url/model_name/capabilities/
        call_config_revision 非密钥调用快照；不保存密钥副本。地址、模型名、能力或密钥变化
        必须递增 revision。Worker 只按 job_id 从 PostgreSQL 读取；当前 revision 与冻结值不同时，
        以 `prompt.configuration_changed` 零调用失败；一致时才读取当前密钥并实时复核权限、
        模型启用和当前地址安全。幂等命中先于最近 20 条清理；原 run 已清理时仍返回原 job、
        `related_resource_id=null`，不得重建。`503` 只使用 `database.unavailable` 或
        `configuration.unavailable`；事务提交后 Redis 投递失败仍返回 `202 pending_dispatch`。
      parameters:
        - $ref: "#/components/parameters/PromptCode"
        - $ref: "#/components/parameters/CsrfHeader"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PromptTestRequest" }
      responses:
        "202": { $ref: "#/components/responses/JobAccepted" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/ValidationError" }
        "503": { $ref: "#/components/responses/Unavailable" }
    delete:
      tags: [Prompts]
      summary: 清空已完成提示词测试并写审计
      parameters:
        - $ref: "#/components/parameters/PromptCode"
        - $ref: "#/components/parameters/CsrfHeader"
      responses:
        "204": { description: 已清空；未完成运行不删除 }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
  /api/v1/prompts/{code}/tests/{run_id}:
    get:
      tags: [Prompts]
      summary: 查看单条提示词测试运行
      parameters:
        - $ref: "#/components/parameters/PromptCode"
