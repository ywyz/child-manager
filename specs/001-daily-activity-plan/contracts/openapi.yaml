      type: object
      additionalProperties: false
      required: [version_id, model_profile_id, variables]
      properties:
        version_id: { $ref: "#/components/schemas/Uuid" }
        model_profile_id: { $ref: "#/components/schemas/Uuid" }
        variables:
          $ref: "#/components/schemas/PromptTestVariables"
          description: >-
            必须与路径中的提示词代码对应并使用脱敏示例值；受理事务会同时冻结规范化实际输入/
            SHA-256、提示词正文/哈希、结果 Schema 和模型非密钥调用配置，公开响应不回传完整上下文
    PromptTestInputSummary:
      type: object
      additionalProperties: false
      required: [provided_variable_names, all_values_redacted]
      properties:
        provided_variable_names:
          type: array
          uniqueItems: true
          maxItems: 10
          description: 按 ASCII 字典序排列；只显示变量名
          items: { type: string, pattern: "^[a-z][a-z0-9_]*$" }
        all_values_redacted: { const: true }
    PromptTestRun:
      type: object
      additionalProperties: false
      required: [id, job_id, prompt_code, input_summary, status, created_at]
      properties:
        id: { $ref: "#/components/schemas/Uuid" }
        job_id: { $ref: "#/components/schemas/Uuid" }
        prompt_code: { $ref: "#/components/schemas/PromptCode" }
        input_summary: { $ref: "#/components/schemas/PromptTestInputSummary" }
        status: { type: string, enum: [pending, succeeded, failed] }
        output_content:
          oneOf:
            - $ref: "#/components/schemas/PromptResult"
