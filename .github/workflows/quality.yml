name: quality

on:
  pull_request:
  push:
    branches: [main, codex, trae]

permissions:
  contents: read

jobs:
  python:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CHILD_MANAGER_TEST_DATABASE_URL: postgresql+psycopg://child_manager:ci-${{ github.run_id }}-${{ github.run_attempt }}@127.0.0.1:5432/child_manager_ci
    services:
      postgres:
        image: postgres:18-alpine@sha256:9a8afca54e7861fd90fab5fdf4c42477a6b1cb7d293595148e674e0a3181de15
        env:
          POSTGRES_DB: child_manager_ci
          POSTGRES_USER: child_manager
          POSTGRES_PASSWORD: ci-${{ github.run_id }}-${{ github.run_attempt }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U child_manager -d child_manager_ci"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 15
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: "3.14"
      - run: uv sync --locked
      - run: uv run ruff format --check .
      - run: uv run ruff check .
      - run: uv run pyright
      - run: uv run openapi-spec-validator specs/001-daily-activity-plan/contracts/openapi.yaml
      - run: uv run pytest
