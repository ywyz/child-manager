name: Quality Gates

on:
  push:
    branches: [main, codex, trae]
  pull_request:
    branches: [main, codex, trae]

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.14"]

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: child_manager
          POSTGRES_PASSWORD: child_manager_test
          POSTGRES_DB: child_manager_test
        ports:
          - 127.0.0.1:5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      CHILD_MANAGER_DATABASE_URL: postgresql+psycopg://child_manager:child_manager_test@127.0.0.1:5432/child_manager_test
      CHILD_MANAGER_TEST_DATABASE_URL: postgresql+psycopg://child_manager:child_manager_test@127.0.0.1:5432/child_manager_test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --locked

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Ruff lint check
        run: uv run ruff check .

      - name: Pyright type check
        run: uv run pyright

      - name: OpenAPI spec validation
        run: uv run python scripts/validate_openapi.py

      - name: Install Playwright chromium
        # 浏览器冒烟测试（tests/web/test_browser_smoke.py）需要真实 Chromium。
        # 仅 `uv sync` 安装 Python 依赖，不会下载浏览器二进制；CI 必须显式安装，
        # 否则 Playwright 测试因找不到 Chromium 可执行文件而失败，T035 门禁不通过。
        run: uv run playwright install --with-deps chromium

      - name: Pytest
        run: uv run pytest
